<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --green: #06C755;
    --navy: #0f1e35;
    --bg: #f2f3f7;
    --white: #ffffff;
    --text: #1a2f4a;
    --text-light: #9aa5b8;
    --border: #e4e8f0;
    --red: #e53935;
    --orange: #f57c00;

  body {
    font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: var(--navy);
    color: var(--white);

    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── エラー画面 ── */
  #error-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 40px;
    text-align: center;
    background: var(--navy);
  }
  #error-screen.active { display: flex; }
  .error-icon { font-size: 64px; margin-bottom: 24px; }
  .error-title { font-size: 22px; font-weight: 700; margin-bottom: 12px; color: #ff6b6b; }
  .error-message { font-size: 15px; color: rgba(255,255,255,0.7); line-height: 1.6; }

  /* ── メイン画面 ── */
  #main-screen {
    display: none;
    flex-direction: column;
    height: 100dvh;
    max-height: 100dvh;
    overflow: hidden;
  }
  #main-screen.active { display: flex; }

  /* ── ヘッダー ── */
  .signage-header {
    background: var(--green);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .signage-logo {
    font-size: 20px;
    font-weight: 900;
    color: white;
    letter-spacing: 1px;
  }
  .signage-group-name {
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    font-weight: 600;
  }
  .last-updated {
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    text-align: right;
  }

  /* ── コンテンツエリア ── */
  /* ── メインレイアウト：上スクロール＋下固定 ── */
  .signage-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 10px;
    overflow: hidden;
    min-height: 0;
  }

  /* 上部：メッセージ（スクロール可・残りスペース全て） */
  #card-message {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* 下部：天気とQRを横並び固定 */
  .signage-bottom {
    display: flex;
    gap: 10px;
    height: 28vh;
    min-height: 160px;
    max-height: 240px;
    flex-shrink: 0;
  }

  #card-weather {
    flex: 1;
    min-width: 0;
  }

  #card-qr {
    flex: 1;
    min-width: 0;
    align-items: center;
  }

  /* ── カード共通 ── */
  .s-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .s-card-title {
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
    flex-shrink: 0;
  }

  /* ── 今日の連絡カード ── */
  #card-message {
    grid-column: 1 / 2;
    grid-row: 1 / 3;
    overflow: hidden;
  }
  .message-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .message-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
  .message-item {
    padding: 10px 12px;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    border-left: 3px solid rgba(255,255,255,0.2);
    flex-shrink: 0;

  .message-item.normal { border-left-color: #f9a825; background: rgba(255,253,231,0.05); }
  .message-item.info   { border-left-color: #66bb6a; background: rgba(241,248,244,0.05); }
  .message-priority {

    font-size: 10px;
    font-weight: 700;
    margin-bottom: 6px;

  .priority-normal { background: #fffde7; color: #f57f17; border: 1px solid #f9a825; }
  .priority-info   { background: #f1f8f4; color: #2e7d32; border: 1px solid #66bb6a; }
  .message-body {

    line-height: 1.5;

  .message-time {

    grid-row: 1 / 2;
  }
  .weather-row {

    grid-row: 2 / 3;

  }

    flex: 1;

    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  #qr-canvas {
    background: white;
    border-radius: 8px;

    align-items: center;
    justify-content: center;

    flex-direction: column;

    width: 40px; height: 40px;
    border: 4px solid rgba(255,255,255,0.2);
    border-top-color: var(--green);

    display: none;
    background: var(--orange);
    color: white;
    text-align: center;
    padding: 6px;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }
  #offline-banner.show { display: block; }
</style>

function showError(title, message) {

function toDateStr(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + d;
}

// ═══════════════════════════════════════════
// 認証チェック（3段階）
// ═══════════════════════════════════════════
async function authenticate() {
  // ① クエリパラメータ確認
  const params = new URLSearchParams(window.location.search);
  const gid = params.get('gid');
  const token = params.get('token');

  if (!gid || !token) {
    showError(
      'サイネージURLが無効です',
      'URLにグループIDとトークンが含まれていません。\nグループ管理者にお問い合わせください。'
    );
    return false;
  }

  // ② DBでトークン照合
  try {
    const { data: group, error } = await sbClient
      .from('group_sessions')
      .select('*')
      .eq('group_id', gid)
      .eq('signage_token', token)
      .eq('signage_enabled', true)
      .single();

    if (error || !group) {
      showError(
        'このサイネージURLは無効です',
        'トークンが一致しないか、サイネージが無効になっています。\nグループ管理者にお問い合わせください。'
      );
      return false;
    }

    // ③ 認証成功
    currentGroupData = group;
    return true;
  } catch (e) {
    showError(
      '認証エラー',
      'サーバーへの接続に失敗しました。\nネットワークをご確認ください。'
    );
    return false;
  }
}

// ═══════════════════════════════════════════
// 今日の連絡を取得・表示
// ═══════════════════════════════════════════
async function loadMessage() {
  try {
    // 連絡とhandover_notesを並列取得
    const [msgResult, handoverResult] = await Promise.allSettled([
      sbClient.from('messages').select('*')
        .eq('group_session_id', currentGroupData.id)
        .order('created_at', { ascending: false })
        .limit(20),
      sbClient.from('handover_notes').select('*')
        .eq('group_session_id', currentGroupData.id)
        .order('created_at', { ascending: false })
        .limit(10)
    ]);

    const messages = msgResult.status === 'fulfilled' ? (msgResult.value.data || []) : [];
    const handovers = handoverResult.status === 'fulfilled' ? (handoverResult.value.data || []) : [];

    const msgList = document.getElementById('message-list');

    if (messages.length === 0 && handovers.length === 0) {
      msgList.innerHTML = '<span class="no-message">本日の連絡はありません</span>';
      return;
    }

    // 連絡のpriorityMap（index.htmlと同じ色・ラベル）
    const msgPriorityMap = {
      urgent: { label: '🔴 緊急', cls: 'priority-urgent', itemCls: 'urgent', order: 0 },
      normal: { label: '🟡 通常', cls: 'priority-normal', itemCls: 'normal', order: 1 },
      info:   { label: '🟢 連絡', cls: 'priority-info',   itemCls: 'info',   order: 2 },
    };

    // 既読・確認情報を並列取得
    const msgIds = messages.map(m => m.id);
    const handoverIds = handovers.map(h => h.id);

    const [receiptsResult, confirmationsResult, membersResult] = await Promise.allSettled([
      msgIds.length > 0
        ? sbClient.from('read_receipts').select('message_id,line_uid').in('message_id', msgIds)
        : Promise.resolve({ data: [] }),
      handoverIds.length > 0
        ? sbClient.from('handover_confirmations').select('handover_id,line_uid,display_name').in('handover_id', handoverIds)
        : Promise.resolve({ data: [] }),
      sbClient.from('group_members').select('line_uid,display_name,is_signage').eq('group_session_id', currentGroupData.id).eq('status', 'approved')
    ]);

    const receipts = receiptsResult.status === 'fulfilled' ? (receiptsResult.value.data || []) : [];
    const confirmations = confirmationsResult.status === 'fulfilled' ? (confirmationsResult.value.data || []) : [];
    const allMembers = membersResult.status === 'fulfilled' ? (membersResult.value.data || []) : [];
    const humanMembers = allMembers.filter(m => !m.is_signage);
    const humanCount = humanMembers.length;
    // サイネージ端末のline_uidセット
    const signageUids = new Set(allMembers.filter(m => m.is_signage).map(m => m.line_uid));

    // 既読数マップ（サイネージ端末を除外）
    const readCountMap = {};
    receipts.forEach(r => {
      if (signageUids.has(r.line_uid)) return; // サイネージ除外
      readCountMap[r.message_id] = (readCountMap[r.message_id] || 0) + 1;
    });
    // 確認済マップ（引き継ぎIDごとの確認者リスト）
    const confirmedMap = {};
    confirmations.forEach(c => {
      if (!confirmedMap[c.handover_id]) confirmedMap[c.handover_id] = [];
      confirmedMap[c.handover_id].push({ line_uid: c.line_uid, display_name: c.display_name });
    });

    // 引き継ぎに確認状況を付与
    const handoverItems = handovers.map(h => {
      const confirmed = (confirmedMap[h.id] || []).length;
      const isFullyConfirmed = humanCount > 0 && confirmed >= humanCount;
      return { ...h, body: h.content, _type: 'handover', _confirmed: confirmed, _fullyConfirmed: isFullyConfirmed };
    });
    const messageItems = messages.map(m => ({ ...m, _type: 'message' }));

    // 引き継ぎソート：未確認優先→優先度順→新しい順
    const priorityOrderH = { action: 0, check: 1, done: 2 };
    handoverItems.sort((a, b) => {
      // WEBアプリと同じ：誰か1人でも確認したら下へ、0人が最上位
      const confirmOrder = (item) => {
        if (item._confirmed === 0) return 0; // 誰も確認していない→最上位
        if (item._fullyConfirmed) return 2;  // 全員確認済→最下位
        return 1;                             // 一部確認済→中位
      };
      const ca = confirmOrder(a);
      const cb = confirmOrder(b);
      if (ca !== cb) return ca - cb;
      // 同じ確認状況なら優先度順
      const pa = priorityOrderH[a.priority] ?? 1;
      const pb = priorityOrderH[b.priority] ?? 1;
      if (pa !== pb) return pa - pb;
      // 同じなら新しい順
      return new Date(b.created_at) - new Date(a.created_at);
    });

    // 連絡ソート：未読優先→緊急度順→新しい順
    const priorityOrderM = { urgent: 0, normal: 1, info: 2 };
    messageItems.sort((a, b) => {
      const aRead = readCountMap[a.id] || 0;
      const bRead = readCountMap[b.id] || 0;
      const aFullRead = aRead >= humanCount;
      const bFullRead = bRead >= humanCount;
      // 未読（0人）が最上位
      const aUnread = aRead === 0 ? 0 : (aFullRead ? 2 : 1);
      const bUnread = bRead === 0 ? 0 : (bFullRead ? 2 : 1);
      if (aUnread !== bUnread) return aUnread - bUnread;
      // 同じ既読状況なら緊急度順
      const pa = priorityOrderM[a.priority] ?? 1;
      const pb = priorityOrderM[b.priority] ?? 1;
      if (pa !== pb) return pa - pb;
      return new Date(b.created_at) - new Date(a.created_at);
    });

    // 引き継ぎラベルを確認状況で決定（3段階）
    const getHandoverLabel = (item) => {
      // WEBアプリと同じ：priorityの色をそのまま使い、確認状況をラベルに反映
      const isConfirmed = item._fullyConfirmed || item._confirmed > 0;
      if (item.priority === 'action') {
        return isConfirmed
          ? { label: '🔴 引き継ぎ・対応済', cls: 'priority-urgent', itemCls: 'urgent' }
          : { label: '🔴 引き継ぎ・未確認', cls: 'priority-urgent', itemCls: 'urgent' };
      }
      if (item.priority === 'done') {
        return { label: '🟢 引き継ぎ・確認済', cls: 'priority-info', itemCls: 'info' };
      }
      // check（通常）
      return isConfirmed
        ? { label: '🟡 引き継ぎ・確認済', cls: 'priority-normal', itemCls: 'normal' }
        : { label: '🟡 引き継ぎ・未確認', cls: 'priority-normal', itemCls: 'normal' };
    };

    const allItems = [...handoverItems, ...messageItems];

    msgList.innerHTML = allItems.map(item => {
      const p = item._type === 'handover'
        ? getHandoverLabel(item)
        : (msgPriorityMap[item.priority] || msgPriorityMap.normal);
      const createdAt = new Date(item.created_at);
      const mo = createdAt.getMonth() + 1;
      const dd = createdAt.getDate();
      const hh = String(createdAt.getHours()).padStart(2, '0');
      const mm = String(createdAt.getMinutes()).padStart(2, '0');
      const timeStr = mo + '月' + dd + '日 ' + hh + ':' + mm;
      const bodyEscaped = (item.body || '').replace(/'/g, '&#39;').replace(/"/g, '&quot;');

      // 既読/確認バッジ
      let readBadge = '';
      if (humanCount > 0) {
        if (item._type === 'message') {
          const readCount = readCountMap[item.id] || 0;
          if (readCount >= humanCount) {
            readBadge = `<span style="font-size:10px; color:#66bb6a; font-weight:700;">✅ 全員既読</span>`;
          } else {
            readBadge = `<span style="font-size:10px; color:#f9a825; font-weight:700;">⚠ ${readCount}/${humanCount}人既読</span>`;
          }
        } else {
          const confirmedCount = item._confirmed || 0;
          if (confirmedCount === 0) {
            readBadge = `<span style="font-size:10px; color:#e53935; font-weight:700;">❗ 未確認</span>`;
          } else {
            // 誰か1人でも確認したら「対応済」→確認者名を表示
            const confirmerNames = (confirmedMap[item.id] || []).map(c => c.display_name).join('・');
            readBadge = `<span style="font-size:10px; color:#66bb6a; font-weight:700;">✅ ${confirmerNames}が確認済</span>`;
          }
        }
      }

      return `
        <div class="message-item ${p.itemCls}" onclick="openModal('${bodyEscaped}','${p.label}','${p.cls}','${timeStr}','${item.id}','${item._type}')" style="cursor:pointer;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
            <span class="message-priority ${p.cls}">${p.label}</span>
            ${readBadge}
          </div>
          <div class="message-body">${item.body || ''}</div>
          <div class="message-time">${timeStr} 送信 　<span style="font-size:10px; color:rgba(255,255,255,0.3);">タップで全文表示</span></div>
        </div>
      `;
    }).join('');

    updateLastUpdated();
  } catch (e) {
    console.error('メッセージ取得エラー:', e);
  }
}

// メッセージ詳細モーダル（既読/確認情報付き）
async function openModal(body, priorityLabel, priorityCls, timeStr, itemId, itemType) {
  const modal = document.getElementById('modal-msg-detail');
  document.getElementById('modal-priority-badge').innerHTML = `<span class="message-priority ${priorityCls}">${priorityLabel}</span>`;
  document.getElementById('modal-body').textContent = body;
  document.getElementById('modal-time').textContent = timeStr + ' 送信';
  document.getElementById('modal-members-info').innerHTML = '<div style="color:rgba(255,255,255,0.4); font-size:12px;">読み込み中...</div>';
  modal.style.display = 'flex';

  try {
    // グループメンバー取得
    const { data: members } = await sbClient.from('group_members')
      .select('line_uid, display_name, is_signage')
      .eq('group_session_id', currentGroupData.id)
      .eq('status', 'approved');

    // is_signage=trueのサイネージ端末を除外
    const humanMembers = (members || []).filter(m => !m.is_signage);

    let readUids = [];
    if (itemType === 'message') {
      // 連絡：既読UIDs取得
      const { data: receipts } = await sbClient.from('read_receipts')
        .select('line_uid').eq('message_id', itemId);
      readUids = (receipts || []).map(r => r.line_uid);
    } else {
      // 引き継ぎ：確認UIDs取得
      const { data: confirmations } = await sbClient.from('handover_confirmations')
        .select('line_uid, display_name, action').eq('handover_id', itemId);
      readUids = (confirmations || []).map(c => c.line_uid);
    }

    const readMembers = humanMembers.filter(m => readUids.includes(m.line_uid));
    const unreadMembers = humanMembers.filter(m => !readUids.includes(m.line_uid));

    let html = '';
    if (itemType === 'message') {
      // 連絡：既読・未読の両方表示
      html = `
        <div style="margin-top:12px; border-top:1px solid rgba(255,255,255,0.1); padding-top:12px;">
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <div>
              <div style="font-size:11px; color:#66bb6a; margin-bottom:6px; font-weight:700;">✅ 既読（${readMembers.length}名）</div>
              ${readMembers.length === 0
                ? `<div style="font-size:12px; color:rgba(255,255,255,0.3);">なし</div>`
                : readMembers.map(m => `<div style="font-size:13px; color:#66bb6a; margin-bottom:4px;">✅ ${m.display_name}</div>`).join('')}
            </div>
            <div>
              <div style="font-size:11px; color:rgba(255,255,255,0.5); margin-bottom:6px; font-weight:700;">⬜ 未読（${unreadMembers.length}名）</div>
              ${unreadMembers.length === 0
                ? `<div style="font-size:12px; color:rgba(255,255,255,0.3);">全員既読</div>`
                : unreadMembers.map(m => `<div style="font-size:13px; color:rgba(255,255,255,0.5); margin-bottom:4px;">⬜ ${m.display_name}</div>`).join('')}
            </div>
          </div>
        </div>
      `;
    } else {
      // 引き継ぎ：確認済メンバーのみ表示
      html = `
        <div style="margin-top:12px; border-top:1px solid rgba(255,255,255,0.1); padding-top:12px;">
          <div style="font-size:11px; color:#66bb6a; margin-bottom:8px; font-weight:700;">✅ 確認済（${readMembers.length}/${humanMembers.length}名）</div>
          ${readMembers.length === 0
            ? `<div style="font-size:12px; color:rgba(255,255,255,0.3);">まだ誰も確認していません</div>`
            : readMembers.map(m => `<div style="font-size:13px; color:#66bb6a; margin-bottom:4px;">✅ ${m.display_name}</div>`).join('')}
        </div>
      `;
    }
    document.getElementById('modal-members-info').innerHTML = html;
  } catch(e) {
    console.error('メンバー情報取得エラー:', e);
    document.getElementById('modal-members-info').innerHTML = '';
  }
}
function closeModal() {
  document.getElementById('modal-msg-detail').style.display = 'none';
}

// ═══════════════════════════════════════════
// 天気・気温を取得・表示（Open-Meteo・APIキー不要）
// ═══════════════════════════════════════════
async function loadWeather() {
  const weatherRow = document.getElementById('weather-row');
  try {
    const region = currentGroupData.region || 'other';
    const coords = REGION_COORDS[region] || REGION_COORDS.other;
    // エリア名を表示
    const regionNameEl = document.getElementById('weather-region-name');
    if (regionNameEl && coords.name !== '---') {
      regionNameEl.textContent = '📍 ' + coords.name;
    }

    const url = `https://api.open-meteo.com/v1/forecast?latitude=${coords.lat}&longitude=${coords.lng}&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo&forecast_days=2`;

    const res = await fetch(url);
    if (!res.ok) throw new Error('天気API応答エラー');
    const data = await res.json();

    const daily = data.daily;
    const days = ['今日', '明日'];

    let html = '';
    for (let i = 0; i < 2; i++) {
      const code = daily.weathercode[i];
      const tMax = Math.round(daily.temperature_2m_max[i]);
      const tMin = Math.round(daily.temperature_2m_min[i]);
      const w = getWeatherIcon(code);
      html += `
        <div class="weather-day">
          <div class="weather-day-label">${days[i]}</div>
          <div class="weather-icon">${w.icon}</div>
          <div class="weather-temp">${tMax}°</div>
          <div class="weather-temp-range">↑${tMax}° ↓${tMin}°</div>
        </div>
      `;
    }
    weatherRow.innerHTML = html;

    // 祝日チェック（今日・明日）
    const today = new Date();
    const tomorrow = new Date(today);
    tomorrow.setDate(today.getDate() + 1);

    const todayStr = toDateStr(today);
    const tomorrowStr = toDateStr(tomorrow);
    const holidayDisplay = document.getElementById('holiday-display');

    if (ALL_HOLIDAYS[todayStr]) {
      holidayDisplay.textContent = '🎌 今日は ' + ALL_HOLIDAYS[todayStr] + ' です';
      holidayDisplay.style.display = 'block';
    } else if (ALL_HOLIDAYS[tomorrowStr]) {
      holidayDisplay.textContent = '🎌 明日は ' + ALL_HOLIDAYS[tomorrowStr] + ' です';
      holidayDisplay.style.display = 'block';
    } else {
      holidayDisplay.style.display = 'none';
    }

    updateLastUpdated();
  } catch (e) {
    // ⚠️ 天気取得失敗でも全体停止しない（設計書事故ポイント③）
    console.error('天気取得エラー:', e);
    weatherRow.innerHTML = '<div class="weather-error">天気情報を取得できませんでした</div>';
  }
}

// ═══════════════════════════════════════════
// QRコード生成
// ═══════════════════════════════════════════
function generateQR() {
  try {
    const joinUrl = 'https://liff.line.me/2009827939-rZo06gWm';
    const container = document.getElementById('qr-canvas');
    container.innerHTML = '';
    new QRCode(container, {
      text: joinUrl,
      width: 120,
      height: 120,
      colorDark: '#0f1e35',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  } catch (e) {
    console.error('QR生成エラー:', e);
  }
}

// ═══════════════════════════════════════════
// オフライン検知
// ═══════════════════════════════════════════
function setupOfflineDetection() {
  const banner = document.getElementById('offline-banner');
  window.addEventListener('offline', () => { banner.classList.add('show'); });
  window.addEventListener('online',  () => { banner.classList.remove('show'); });
  if (!navigator.onLine) banner.classList.add('show');
}

// 縦横レイアウト判定（JSで強制制御）
function applyLayout() {
  // URLパラメータで強制指定可能（Fully Kiosk用）
  const params = new URLSearchParams(window.location.search);
  const forceLayout = params.get('layout'); // 'portrait' or 'landscape'
  
  let isPortrait;
  if (forceLayout === 'portrait') {
    isPortrait = true;
  } else if (forceLayout === 'landscape') {
    isPortrait = false;
  } else {
    // 複数の方法で縦画面を判定
    const bySize = window.innerHeight > window.innerWidth;
    const byScreen = screen.height > screen.width;
    const byOrientation = screen.orientation 
      ? screen.orientation.type.includes('portrait')
      : (window.orientation === 0 || window.orientation === 180);
    isPortrait = bySize || byScreen || byOrientation;
  }
  
  if (isPortrait) {
    document.body.classList.add('portrait');
  } else {
    document.body.classList.remove('portrait');
  }
}

function setupLayoutDetection() {
  applyLayout();
  window.addEventListener('resize', applyLayout);
  // orientationchangeイベントも監視
  window.addEventListener('orientationchange', () => {
    setTimeout(applyLayout, 100);
  });
}

// ═══════════════════════════════════════════
// 深夜3時 自動リロード（設計書事故ポイント⑦）
// ═══════════════════════════════════════════
function scheduleNightlyReload() {
  const now = new Date();
  const next3am = new Date();
  next3am.setHours(3, 0, 0, 0);
  if (next3am <= now) {
    next3am.setDate(next3am.getDate() + 1);
  }
  const ms = next3am - now;
  setTimeout(() => { location.reload(); }, ms);
}

// ═══════════════════════════════════════════
// 定期更新（5分ごと）
// ═══════════════════════════════════════════
function startPolling() {
  if (updateTimer) clearInterval(updateTimer);
  updateTimer = setInterval(async () => {
    // トークン再検証（設計書事故ポイント②：キャッシュしない）
    const params = new URLSearchParams(window.location.search);
    const gid = params.get('gid');
    const token = params.get('token');
    try {
      const { data: group } = await sbClient
        .from('group_sessions')
        .select('*')
        .eq('group_id', gid)
        .eq('signage_token', token)
        .eq('signage_enabled', true)
        .single();
      if (!group) {
        // トークン無効化されたら即エラー画面へ
        showError('このサイネージURLは無効になりました', '管理者がURLを再生成しました。\n新しいURLで再度アクセスしてください。');
        clearInterval(updateTimer);
        return;
      }
      currentGroupData = group;
    } catch (e) {
      // ネットワークエラーはスキップ（オフラインバナーで通知済み）
    }
    await loadMessage();
    await loadWeather();
  }, 5 * 60 * 1000); // 5分ごと
}

// ═══════════════════════════════════════════
// 初期化
// ═══════════════════════════════════════════
async function init() {
  // Supabase初期化
  sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // 認証（3段階）
  const ok = await authenticate();
  if (!ok) return;

  // 画面表示
  document.getElementById('header-group-name').textContent =
    currentGroupData.group_name || currentGroupData.group_id;

  showMain();
  setupOfflineDetection();
  setupLayoutDetection();
  scheduleNightlyReload();

  // データ取得（並列）
  await Promise.allSettled([
    loadMessage(),
    loadWeather(),
  ]);

  generateQR();
  startPolling();
}

// 起動
// ライブラリ読み込み待機（最大5秒）してから初期化
function waitForLibsAndInit() {
  let waited = 0;
  const check = () => {
    if (typeof window.supabase !== 'undefined') {
      init(); // QRCodeがなくてもinitは実行（generateQR内でtry/catchしている）
    } else if (waited < 5000) {
      waited += 100;
      setTimeout(check, 100);
    } else {
      // タイムアウト：supabaseだけ未読み込みなら諦めてエラー表示
      showError('ライブラリ読み込みエラー', 'ページを再読み込みしてください。');
    }
  };
  check();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', waitForLibsAndInit);
} else {
  waitForLibsAndInit();
}
